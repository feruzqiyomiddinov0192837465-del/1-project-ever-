<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia&effect=neon|outline|emboss|shadow=multiple">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia&effect=fire">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<title>Enter App</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("kerak.jpg") no-repeat center center fixed;
    background-size: cover;
    color: white;
    text-align: center;
}
.container {
    width: 350px;
    margin: 150px auto;
    padding: 30px;
    background: rgba(0,0,0,0.3);
    border-radius: 15px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
h1 {
    font-size: 2rem;
    margin-bottom: 20px;
}
button {
    padding: 12px 25px;
    border-radius: 8px;
    border: none;
    background: #1DB954; /* fun green */
    color: white;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s ease;
}
button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 10px #1DB954;
}
</style>
</head>
<body>

<div class="container">
    <h1><span  style="font-family: sofia; font-" class="font-effect-neon">Welcome!</span></h1>
    <p><span  style="font-family: sofia; font-" class="font-effect-fire">Click</span> 
        <span  style="font-family: sofia; font-" class="font-effect-neon">below</span> 
        <span  style="font-family: sofia; font-" class="font-effect-fire">to</span> 
        <span  style="font-family: sofia; font-" class="font-effect-neon">start</span> 
        <span  style="font-family: sofia; font-" class="font-effect-fire">adventure!</span></p>
    <button onclick="enterRegistration()">Enter</button>
</div>

<script>
function enterRegistration(){
    // Redirect to your registration page
    window.location.href = "index2.html"; 
}
</script>
</body>
</html>
